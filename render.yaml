services:
  - type: web
    name: online-radio
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: radio-data
      mountPath: /opt/render/project/src/uploads
      sizeGB: 10
